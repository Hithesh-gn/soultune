<!DOCTYPE html>
<html>

<head>
    <title>Soul Tune</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)),
                url('images/image.jpg');

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }


        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin-bottom: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1DB954;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1ed760;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Soul Tune 🎵</h1>
        <h3>Login</h3>

        <input type="text" id="username" placeholder="Enter your name">

        <button onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            let user = document.getElementById("username").value;

            if (user == "") {
                alert("Enter username");
            } else {
                localStorage.setItem("user", user);
                window.location.href = "language.html";
            }
        }
    </script>

</body>

</html>
